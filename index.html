<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVCO TECH | Inovação • Dados • Automação</title>
    <style>
        :root {
            --primary-dark: #0a192f;
            --accent-lime: #ccff00;
            --text-light: #e6f1ff;
            --slate-gray: #8892b0;
        }

        body {
            background-color: var(--primary-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(204, 255, 0, 0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--accent-lime);
        }

        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .hero span {
            color: var(--accent-lime);
        }

        .hero p {
            color: var(--slate-gray);
            max-width: 600px;
            font-size: 1.2rem;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 50px 10%;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-lime);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.07);
        }

        .cta-button {
            background: transparent;
            color: var(--accent-lime);
            border: 2px solid var(--accent-lime);
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .cta-button:hover {
            background: var(--accent-lime);
            color: var(--primary-dark);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Use a logo que geramos aqui -->
            <span class="logo-text">DVCO TECH</span>
        </div>
        <nav>
            <a href="mailto:contato@dvcotech.com.br" class="cta-button" style="padding: 8px 15px; font-size: 0.9rem;">Contato</a>
        </nav>
    </header>

<section id="contato" style="padding: 8px 10% 50px 10%; text-align: center;">
    <h2 style="color: var(--accent-lime); font-size: 2rem; margin-bottom: 30px;">Fale com a DVCO TECH</h2>
    
    <!-- Integração com Formspree: Basic HTML -->
    <form action="https://formspree.io/f/mvzloanj" method="POST" style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 10px;">
        
        <div style="text-align: left;">
            <label style="color: var(--slate-gray); display: block; margin-bottom: 5px;">Seu Nome:</label>
            <input type="text" name="name" required placeholder="Ex: Natália Bomfim" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid rgba(204, 255, 0, 0.2); background: var(--primary-dark); color: white; box-sizing: border-box;">
        </div>

        <div style="text-align: left;">
            <label style="color: var(--slate-gray); display: block; margin-bottom: 5px;">Seu E-mail:</label>
            <input type="email" name="email" required placeholder="seu@email.com" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid rgba(204, 255, 0, 0.2); background: var(--primary-dark); color: white; box-sizing: border-box;">
        </div>

        <div style="text-align: left;">
            <label style="color: var(--slate-gray); display: block; margin-bottom: 5px;">Assunto:</label>
            <select name="subject" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid rgba(204, 255, 0, 0.2); background: var(--primary-dark); color: white; box-sizing: border-box;">
                <option value="BI & Dados">Business Intelligence & Dados</option>
                <option value="Automacao">Automação de Processos</option>
                <option value="Dev Web">Desenvolvimento Web (Sites/Sistemas)</option>
                <option value="Outros">Outros Assuntos</option>
            </select>
        </div>

        <div style="text-align: left;">
            <label style="color: var(--slate-gray); display: block; margin-bottom: 5px;">Mensagem:</label>
            <textarea name="message" required placeholder="Como a DVCO TECH pode ajudar seu negócio hoje?" rows="5" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid rgba(204, 255, 0, 0.2); background: var(--primary-dark); color: white; box-sizing: border-box; resize: vertical;"></textarea>
        </div>

        <button type="submit" class="cta-button" style="cursor: pointer; width: 100%; font-size: 1.1rem;">Enviar Solicitação</button>
        
        <!-- Campo para evitar SPAM -->
        <input type="hidden" name="_subject" value="Novo contato via site oficial DVCO TECH">
    </form>
</section>

</body>
</html>
